# prod.yml

name: prod

on:
  release:
    types: [created]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6
      - run: |
          mkdir -p dist
          cp -R modules dist/modules
          touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'
      - uses: actions/deploy-pages@v5
